# Starship configuration
add_newline = true

# Full-fledged format string
format = """
$os$directory$git_branch$git_status$package$c$cmake$cobol$daml$dart$deno$dotnet$elixir$elm$erlang$golang$haskell$helm$java$julia$kotlin$lua$nim$nodejs$ocaml$perl$php$pulumi$pure$python$raku$red$ruby$rust$scala$swift$terraform$vlang$vagrant$zig$nix_shell$conda$container$aws$gcloud$openstack$azure$direnv$env_var$crystal$custom$cmd_duration
$jobs$character"""

[os]
disabled = false
style = "bold white"

[os.symbols]
Arch = "󰣇 "
Ubuntu = "󰕈 "
Linux = "󰌽 "

[directory]
style = "bold cyan"
truncation_length = 3
truncation_symbol = "…/"
format = "[$path]($style) "

[character]
success_symbol = "[λ](bold magenta) "
error_symbol = "[λ](bold red) "
vimcmd_symbol = "[ν](bold yellow) "

[git_branch]
symbol = " "
style = "bold white"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style)) "
modified = "!"
untracked = "?"
stashed = '\$' # Note: This was already escaped in the original string
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
up_to_date = ""

[python]
symbol = "󱔎 "
style = "bold yellow"
# Explicitly format to ensure it stays on the same line and looks consistent
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = "󰎙 "
style = "bold green"
format = "via [$symbol($version )]($style)"

[rust]
symbol = "󱘗 "
style = "bold orange"
format = "via [$symbol($version )]($style)"

[golang]
symbol = "󰟓 "
style = "bold cyan"
format = "via [$symbol($version )]($style)"

[lua]
symbol = "󰢱 "
style = "bold blue"
format = "via [$symbol($version )]($style)"

[nix_shell]
symbol = "󱄅 "
format = 'via [$symbol( \($name\))]($style) '

[package]
symbol = "󰏗 "
format = "is [$symbol$version]($style) "

[cmd_duration]
min_time = 500
style = "bold yellow"
format = "took [$duration]($style) "
