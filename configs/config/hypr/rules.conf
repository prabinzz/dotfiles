# -----------------------------------------------------
# General Floating Window Rules
# -----------------------------------------------------

# -- System & Utilities --
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(kvantummanager)$
windowrule = float on, match:class ^(qt5ct)$
windowrule = float on, match:class ^(qt6ct)$
windowrule = float on, match:class ^(nwg-look)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:class ^(it.miyakogi.copyq)$

# -- File Operations (Progress Bars) --
windowrule = float on, match:class ^(org.gnome.Nautilus)$, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(thunar)$, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(dolphin)$, match:title ^(Copying — Dolphin)$
windowrule = float on, match:title ^(File Operation Progress)$

# -- Common Dialogs (Open, Save, Preferences) --
windowrule = float on, match:title ^(Open File)(.*)$
windowrule = float on, match:title ^(Select a File)(.*)$
windowrule = float on, match:title ^(Choose wallpaper)(.*)$
windowrule = float on, match:title ^(Open Folder)(.*)$
windowrule = float on, match:title ^(Save As)(.*)$
windowrule = float on, match:title ^(Library)(.*)$
windowrule = float on, match:title ^(File Upload)(.*)$
windowrule = float on, match:title ^(.*Settings.*)$
windowrule = float on, match:title ^(.*Preferences.*)$
windowrule = float on, match:modal true

# -- Picture-in-Picture --
windowrule {
    name = picture-in-picture
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    move = 100%-w-20 100%-h-20
    size = 25% 25%
}

# -- Scratchpad Terminal --
windowrule {
    name = scratchpad
    match:class = ^(scratchpad)$
    float = on
    size = 80% 60%
    center = on
    animation = slide
}

# -- Fixes & Behavior --
# Prevent apps from maximizing themselves (especially XWayland)
windowrule = suppress_event maximize, match:class .*

# Center all floating windows by default
windowrule = center on, match:float true
