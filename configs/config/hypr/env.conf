# --- GTK Theme ---
env = GTK_THEME,catppuccin-mocha-mauve-standard+default

# --- QT Theme ---
# Using 'kde' platform theme as you have plasma-integration and breeze installed.
# This ensures KDE apps like Dolphin follow your kdeglobals (Breeze Dark) correctly.
env = QT_QPA_PLATFORMTHEME,kde
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# --- Icons & Cursors ---
env = ICON_THEME,Adwaita
env = XCURSOR_THEME,default
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,default
env = HYPRCURSOR_SIZE,24

# --- Desktop Environment ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# --- NVIDIA ---
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_DRM_NO_ATOMIC,1
